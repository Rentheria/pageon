<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pageon Vanilla Demo</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #0b1020; color: #e6ecff; }
      .toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
      button, input, select { padding: 8px; border-radius: 6px; border: 1px solid #31457a; background: #111a33; color: #e6ecff; }
      #viewer { width: min(900px, 100%); height: min(70vh, 780px); border: 1px solid #31457a; border-radius: 8px; background: #1a2545; padding: 8px; }
      .status { margin-top: 8px; color: #98a6d9; }
      .error { margin-top: 8px; color: #ff8796; min-height: 24px; }
      .metrics { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; }

      .read-overlay {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 8px;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(8, 12, 28, 0.78);
        border: 1px solid rgba(99, 124, 183, 0.4);
        backdrop-filter: blur(8px);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
        z-index: 2147483647;
      }
      .read-overlay button {
        border: 1px solid rgba(120, 145, 200, 0.35);
        background: rgba(20, 30, 60, 0.9);
        color: #e6ecff;
        padding: 6px 12px;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
      }
      .read-overlay button:hover { background: rgba(40, 60, 110, 0.95); }
      .read-overlay #readPageLabel { padding: 0 6px; color: #cdd6ff; font-variant-numeric: tabular-nums; }

      body.read-mode { padding: 0; background: #000; overflow: hidden; }
      body.read-mode h1,
      body.read-mode .toolbar,
      body.read-mode .status,
      body.read-mode .metrics,
      body.read-mode .error { display: none !important; }
      body.read-mode #viewer {
        width: 100vw;
        height: 100vh;
        max-width: none;
        max-height: none;
        border: 0;
        border-radius: 0;
        padding: 0;
        background: #000;
        cursor: none;
      }
      body.read-mode .read-overlay { display: inline-flex; }
      body.read-mode.overlay-visible { cursor: default; }
      body.read-mode.overlay-visible #viewer { cursor: default; }
      body.read-mode.overlay-visible .read-overlay {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <h1>Pageon Demo Fase 2</h1>
    <div class="toolbar">
      <button id="prev">Anterior</button>
      <button id="next">Siguiente</button>
      <label>Ir a: <input id="pageInput" type="number" min="1" value="1" style="width: 72px" /></label>
      <label>
        Animación:
        <select id="animation">
          <option value="none">none</option>
          <option value="fade">fade</option>
          <option value="slide" selected>slide</option>
          <option value="page-flip">page-flip</option>
        </select>
      </label>
      <label>
        Vista:
        <select id="viewMode">
          <option value="single" selected>1 página</option>
          <option value="spread">2 páginas</option>
        </select>
      </label>
      <button id="zoomIn">Zoom +</button>
      <button id="zoomOut">Zoom -</button>
      <button id="zoomReset">Reset zoom</button>
      <button id="fitWidth">Fit width</button>
      <button id="fitHeight">Fit height</button>
      <button id="fitPage">Fit page</button>
      <button id="toggleKeyboard">Keyboard: on</button>
      <button id="toggleGestures">Gestures: on</button>
      <label>PDF: <input id="pdfFile" type="file" accept="application/pdf" /></label>
      <button id="useDefaultPdf">Use default PDF</button>
      <button id="enterFullscreen">Fullscreen lectura</button>
      <span id="pageLabel">Página 1 de ?</span>
    </div>

    <div id="viewer"></div>
    <div class="status" id="status">Cargando...</div>
    <div class="metrics">
      <span id="zoomLabel">Zoom: -</span>
      <span id="fitLabel">Fit: -</span>
      <span id="loadingLabel">Loading: -</span>
    </div>
    <div class="error" id="error"></div>

    <div id="readOverlay" class="read-overlay" role="toolbar" aria-label="Lectura">
      <button id="readPrev" aria-label="Página anterior">&larr;</button>
      <span id="readPageLabel">- / -</span>
      <button id="readNext" aria-label="Página siguiente">&rarr;</button>
      <button id="exitFullscreen" aria-label="Salir de pantalla completa">&times;</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
